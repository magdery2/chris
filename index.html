<style>
  :root {
    --bg-red:      #b41818;
    --bg-deep:     #6a0f0f;
    --ink:         #ffffff;
    --ink-soft:    rgba(255,255,255,0.78);
    --ink-mute:    rgba(255,255,255,0.55);
    --pill-bg:     #ffffff;
    --pill-ink:    #1a0a0a;
    --frame:       #0a0405;

    --font-display: 'Mulish', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

  body {
    font-family: var(--font-display);
    background: var(--frame);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Stage ───────────────────────────────────────────────────── */
  .stage {
    position: fixed;
    inset: 24px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 24px 60px -20px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.04);
    background: var(--bg-red);
  }

  /* Apple image as the soul of the page. Gentle breathing zoom. */
  .stage-bg {
    position: absolute;
    inset: -2%;
    background-image: url("assets/apple-bg.png");
    background-size: cover;
    background-position: center;
    transform-origin: 50% 52%;
    animation: breathe 16s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1.02) translate3d(0, 0, 0); }
    50%      { transform: scale(1.06) translate3d(0, -6px, 0); }
  }

  /* Soft contrast lift behind the text so the headline reads on the apple */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 42%, rgba(180,24,24,0) 0%, rgba(106,15,15,0.28) 75%);
    pointer-events: none;
    z-index: 2;
  }

  /* Drifting sparkles overlay — adds 'magic' on top of the static ones in the image */
  .sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .sparkle {
    position: absolute;
    color: rgba(255, 220, 150, 0.9);
    animation: twinkle 4s ease-in-out infinite;
    filter: drop-shadow(0 0 6px rgba(255, 200, 130, 0.6));
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0;   transform: scale(0.5) rotate(0deg); }
    50%      { opacity: 0.95; transform: scale(1)   rotate(45deg); }
  }

  /* ── Top bar ─────────────────────────────────────────────────── */
  .topbar {
    position: absolute;
    inset: 32px 40px auto 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }

  .icon-btn {
    width: 40px; height: 40px;
    background: transparent;
    border: 0;
    color: var(--ink);
    display: grid; place-items: center;
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0.95;
  }
  .icon-btn:hover { transform: scale(1.08); opacity: 1; }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn svg { width: 28px; height: 28px; stroke-width: 2.5; }

  /* ── Hero ────────────────────────────────────────────────────── */
  .hero {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    z-index: 5;
    padding: 100px 40px;
  }

  .hero-inner {
    width: 100%;
    text-align: center;
    pointer-events: none;
  }

  .headline {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(48px, 9vw, 132px);
    letter-spacing: -0.025em;
    line-height: 1;
    margin: 0;
    color: var(--ink);
    text-shadow: 0 4px 30px rgba(0,0,0,0.18);
  }

  .subline {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(20px, 2.6vw, 38px);
    letter-spacing: -0.01em;
    margin: clamp(14px, 2vh, 22px) 0 0;
    color: var(--ink);
    opacity: 0.96;
    text-shadow: 0 3px 20px rgba(0,0,0,0.18);
  }

  /* keyframes removed — was causing pending state in iframe rendering */

  .cta-wrap {
    display: flex;
    justify-content: center;
    margin-top: clamp(36px, 6vh, 64px);
    pointer-events: auto;
  }

  /* Subscribe pill — collapsed state */
  .subscribe {
    position: relative;
    display: inline-flex;
    align-items: center;
    background: var(--pill-bg);
    border-radius: 999px;
    height: 56px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.22), 0 2px 0 rgba(0,0,0,0.04);
    transition: width 0.5s cubic-bezier(.7,0,.2,1), box-shadow 0.3s ease, transform 0.3s ease;
    overflow: hidden;
    width: 200px;
  }
  .subscribe.open { width: 380px; }
  .subscribe.done { width: 280px; }
  .subscribe:hover { box-shadow: 0 16px 50px rgba(0,0,0,0.28), 0 2px 0 rgba(0,0,0,0.04); transform: translateY(-1px); }

  .sub-cta {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: transparent;
    border: 0;
    color: var(--pill-ink);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }
  .subscribe.open .sub-cta,
  .subscribe.done .sub-cta { opacity: 0; pointer-events: none; }

  .sub-form {
    display: flex;
    align-items: center;
    width: 100%;
    height: 100%;
    padding: 6px 6px 6px 24px;
    opacity: 0;
    transition: opacity 0.3s ease 0.15s;
    pointer-events: none;
  }
  .subscribe.open .sub-form { opacity: 1; pointer-events: auto; }
  .sub-form input {
    flex: 1;
    border: 0;
    outline: none;
    background: transparent;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 15px;
    color: var(--pill-ink);
  }
  .sub-form input::placeholder { color: rgba(26,10,10,0.4); }
  .sub-form button {
    border: 0;
    background: var(--pill-ink);
    color: #fff;
    border-radius: 999px;
    width: 44px; height: 44px;
    display: grid; place-items: center;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .sub-form button:hover { background: var(--bg-deep); }
  .sub-form button:active { transform: scale(0.94); }

  .sub-done {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: var(--pill-ink);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.2px;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.35s ease 0.1s;
    pointer-events: none;
  }
  .subscribe.done .sub-done {
    opacity: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sub-done svg { width: 18px; height: 18px; stroke: currentColor; }

  /* ── Bottom bar ──────────────────────────────────────────────── */
  .botbar {
    position: absolute;
    inset: auto 40px 32px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    z-index: 10;
    gap: 24px;
  }

  .geo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    font-family: var(--font-mono);
    color: var(--ink);
    text-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .geo-coords {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }
  .geo-arrow {
    display: inline-block;
    transform-origin: 50% 50%;
    animation: bob 2.4s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(4px); }
  }
  .geo-label {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .social-link {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 26px;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: -0.02em;
    transition: opacity 0.3s ease, transform 0.3s ease;
    text-shadow: 0 2px 16px rgba(0,0,0,0.25);
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
  }
  .social-link:hover { opacity: 0.8; transform: translateY(-2px); }
  .social-link sup {
    font-size: 13px;
    font-weight: 700;
    opacity: 0.65;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Small screens ───────────────────────────────────────────── */
  @media (max-width: 720px) {
    .stage { inset: 12px; }
    .topbar { inset: 20px 20px auto 20px; }
    .botbar { inset: auto 20px 20px 20px; flex-direction: column-reverse; align-items: stretch; gap: 18px; }
    .botbar .social-link { align-self: flex-end; }
    .hero { padding: 80px 20px; }
    .geo-coords { font-size: 15px; }
    .subscribe { width: 180px; height: 50px; }
    .subscribe.open { width: 92%; max-width: 360px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .stage-bg, .sparkle, .geo-arrow, .headline, .subline, .cta-wrap { animation: none !important; }
  }
</style>

<script>
  // ── Sparkle overlay (additive twinkle on top of the apple image) ──
  (function makeSparkles() {
    const container = document.getElementById('sparkles');
    const COUNT = 16;
    // Distribute around the apple, avoid the headline area at ~y 45-55%
    for (let i = 0; i < COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      // bias to edges
      const angle = (i / COUNT) * Math.PI * 2 + Math.random() * 0.5;
      const radius = 30 + Math.random() * 25;
      const x = 50 + Math.cos(angle) * radius;
      const y = 50 + Math.sin(angle) * radius;
      el.style.left = Math.max(2, Math.min(98, x)) + '%';
      el.style.top  = Math.max(2, Math.min(98, y)) + '%';
      el.style.animationDelay = (Math.random() * 4) + 's';
      el.style.animationDuration = (3 + Math.random() * 2.5) + 's';
      const size = 6 + Math.random() * 10;
      el.innerHTML = `
        <svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor">
          <path d="M12 0 L13.5 9.5 L24 12 L13.5 14.5 L12 24 L10.5 14.5 L0 12 L10.5 9.5 Z"/>
        </svg>`;
      container.appendChild(el);
    }
  })();

  // ── Subtle cursor parallax on the background image ──
  (function parallax() {
    const stage = document.getElementById('stage');
    const bg = document.getElementById('stageBg');
    let tx = 0, ty = 0, cx = 0, cy = 0;
    stage.addEventListener('mousemove', (e) => {
      const r = stage.getBoundingClientRect();
      const dx = (e.clientX - (r.left + r.width / 2)) / r.width;
      const dy = (e.clientY - (r.top + r.height / 2)) / r.height;
      tx = dx * -14;
      ty = dy * -10;
    });
    stage.addEventListener('mouseleave', () => { tx = 0; ty = 0; });
    (function loop() {
      cx += (tx - cx) * 0.06;
      cy += (ty - cy) * 0.06;
      bg.style.translate = `${cx.toFixed(2)}px ${cy.toFixed(2)}px`;
      requestAnimationFrame(loop);
    })();
  })();

  // ── Subscribe interaction ──
  (function subscribe() {
    const wrap  = document.getElementById('subscribe');
    const cta   = document.getElementById('subCta');
    const form  = document.getElementById('subForm');
    const email = document.getElementById('subEmail');

    const LS_KEY = 'apple-fairy-subscribers';
    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xnjrppnj';

    // expose helpers for the Tweaks panel
    window.__sub = {
      getList() {
        try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
        catch (e) { return []; }
      },
      addToList(addr) {
        const list = window.__sub.getList();
        if (list.find(x => x.email === addr)) return list;
        list.push({ email: addr, ts: new Date().toISOString() });
        localStorage.setItem(LS_KEY, JSON.stringify(list));
        return list;
      },
      clearList() {
        localStorage.removeItem(LS_KEY);
      },
      exportCsv() {
        const list = window.__sub.getList();
        const rows = [['email', 'subscribed_at'], ...list.map(r => [r.email, r.ts])];
        const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url  = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `subscribers-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }
    };

    cta.addEventListener('click', () => {
      wrap.classList.remove('done');
      wrap.classList.add('open');
      setTimeout(() => email.focus(), 300);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const v = email.value.trim();
      if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
        email.style.color = '#b41818';
        email.placeholder = 'enter a valid email';
        return;
      }

      // 1) Always save locally so you have a backup list even if the network fails
      window.__sub.addToList(v);

      // 2) Notify via Formspree. Override with `formEndpoint` tweak to use a different service.
      const endpoint = (form.dataset.endpoint && /^https?:\/\//.test(form.dataset.endpoint))
        ? form.dataset.endpoint
        : FORMSPREE_ENDPOINT;

      // Optimistic UI — show success immediately
      wrap.classList.remove('open');
      wrap.classList.add('done');
      email.value = '';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            email: v,
            _subject: 'New Apple Fairy subscriber'
          })
        });
        if (!res.ok) {
          console.warn('Subscribe POST returned non-OK:', res.status, await res.text());
        }
      } catch (err) {
        console.warn('Subscribe POST failed (kept local copy):', err);
      }
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target) && wrap.classList.contains('open') && !email.value) {
        wrap.classList.remove('open');
      }
    });
  })();
</script>

<script type="text/babel" data-presets="env,react">
/* global React, ReactDOM, TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakToggle, TweakText */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "headline": "Chris Kaisin",
  "subline": "Apple Fairy Magic Coming Soon",
  "ctaLabel": "Subscribe",
  "geoLabel": "",
  "sparkles": false,
  "breathe": false,
  "vibe": "bloom",
  "formEndpoint": ""
}/*EDITMODE-END*/;

const VIBES = {
  mystery: { bg: '#b41818', deep: '#6a0f0f', ink: '#ffffff' },
  midnight: { bg: '#1a0a0f', deep: '#000000',  ink: '#ffd5b8' },
  bloom:   { bg: '#d63838', deep: '#8a1a1a', ink: '#fff4e8' }
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const v = VIBES[t.vibe] || VIBES.mystery;
    const r = document.documentElement;
    r.style.setProperty('--bg-red', v.bg);
    r.style.setProperty('--bg-deep', v.deep);
    r.style.setProperty('--ink', v.ink);
  }, [t.vibe]);

  React.useEffect(() => {
    document.querySelector('[data-comment-anchor="headline"]').textContent = t.headline;
    document.querySelector('[data-comment-anchor="subline"]').textContent  = t.subline;
    document.getElementById('subCta').textContent = t.ctaLabel;
    document.querySelector('.geo-label').textContent = t.geoLabel;
  }, [t.headline, t.subline, t.ctaLabel, t.geoLabel]);

  React.useEffect(() => {
    document.getElementById('sparkles').style.display = t.sparkles ? '' : 'none';
  }, [t.sparkles]);

  React.useEffect(() => {
    const bg = document.getElementById('stageBg');
    bg.style.animationPlayState = t.breathe ? 'running' : 'paused';
  }, [t.breathe]);

  React.useEffect(() => {
    const form = document.getElementById('subForm');
    if (t.formEndpoint && /^https?:\/\//.test(t.formEndpoint)) {
      form.dataset.endpoint = t.formEndpoint;
    } else {
      delete form.dataset.endpoint;
    }
  }, [t.formEndpoint]);

  // refresh subscriber count when tweaks open / submissions happen
  const [subCount, setSubCount] = React.useState(0);
  React.useEffect(() => {
    const update = () => setSubCount((window.__sub?.getList() || []).length);
    update();
    const id = setInterval(update, 1500);
    return () => clearInterval(id);
  }, []);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Vibe" />
      <TweakRadio label="Mood" value={t.vibe}
                  options={['mystery','midnight','bloom']}
                  onChange={(v) => setTweak('vibe', v)} />
      <TweakToggle label="Sparkles" value={t.sparkles}
                   onChange={(v) => setTweak('sparkles', v)} />
      <TweakToggle label="Breathe"  value={t.breathe}
                   onChange={(v) => setTweak('breathe', v)} />
      <TweakSection label="Copy" />
      <TweakText label="Headline" value={t.headline}
                 onChange={(v) => setTweak('headline', v)} />
      <TweakText label="Subline"  value={t.subline}
                 onChange={(v) => setTweak('subline', v)} />
      <TweakText label="CTA"      value={t.ctaLabel}
                 onChange={(v) => setTweak('ctaLabel', v)} />
      <TweakText label="Geo label" value={t.geoLabel}
                 onChange={(v) => setTweak('geoLabel', v)} />
      <TweakSection label="Subscribe list" />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 10px 8px', fontSize:11, opacity:0.75 }}>
        <span>{subCount} {subCount === 1 ? 'subscriber' : 'subscribers'} saved locally</span>
        <div style={{ display:'flex', gap:6 }}>
          <button type="button"
            onClick={() => window.__sub.exportCsv()}
            style={{ font:'inherit', padding:'4px 10px', borderRadius:6, border:'1px solid rgba(0,0,0,0.15)', background:'rgba(255,255,255,0.7)', cursor:'pointer' }}>
            Export CSV
          </button>
          <button type="button"
            onClick={() => { if (confirm('Clear the local subscriber list?')) window.__sub.clearList(); }}
            style={{ font:'inherit', padding:'4px 10px', borderRadius:6, border:'1px solid rgba(0,0,0,0.15)', background:'rgba(255,255,255,0.7)', cursor:'pointer' }}>
            Clear
          </button>
        </div>
      </div>
      <TweakText label="Custom endpoint"
                 placeholder="(optional — overrides FormSubmit)"
                 value={t.formEndpoint}
                 onChange={(v) => setTweak('formEndpoint', v)} />
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<App />);
</script>

<style id="__om-edit-overrides"></style>
</body>
</html>
