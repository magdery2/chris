<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Page not found — Chris Kaisin</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Mulish:wght@400;700&display=swap" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Mulish:wght@400;700&display=swap" /></noscript>
<style>
  :root {
    --bg:    #0c0a09;
    --gold:  #c8783c;
    --cream: #f0ebe3;
    --soft:  rgba(240,235,227,0.65);
    --mute:  rgba(240,235,227,0.32);
    --rule:  rgba(240,235,227,0.07);
    --frame: #070505;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Mulish', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: var(--sans);
    background: var(--frame);
    color: var(--cream);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    background: var(--bg);
    margin: 20px;
    border-radius: 3px;
    padding: 80px 60px;
    text-align: center;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 40px 100px -32px rgba(0,0,0,0.8), 0 0 0 1px rgba(240,235,227,0.04);
  }
  .num {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(80px, 18vw, 140px);
    line-height: 1;
    color: var(--gold);
    opacity: 0.6;
    margin: 0 0 28px;
    letter-spacing: -0.02em;
  }
  h1 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(22px, 4vw, 32px);
    line-height: 1.3;
    margin: 0 0 16px;
    color: var(--cream);
  }
  p {
    font-size: 14px;
    line-height: 1.75;
    color: var(--soft);
    margin: 0 0 40px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mute);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--cream); }
  .back-link svg { transition: transform 0.2s; }
  .back-link:hover svg { transform: translateX(-3px); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>This page doesn't exist.</h1>
    <p>The apple must have fallen somewhere else.<br>Let's go back to where the fruit is.</p>
    <a class="back-link" href="/">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
      Back home
    </a>
  </div>
</body>
</html>
